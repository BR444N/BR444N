name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN_STATS }}
          user: BR444N
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Mexico_City
          
          # Estilo Amarillo #FFE953
          palette: custom
          color_primary: "#FFE953"
          
          # Orden: Lenguajes primero, luego Stats
          config_order: languages, base.view
          
          # Configuración de Lenguajes
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          
          # Stats de actividad
          plugin_lines: yes

name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN_STATS }}
          user: BR444N
          template: classic
          
          # IMPORTANTE: Desactivamos la base textual para usar PANELES
          base: "" 
          config_timezone: America/Mexico_City
          
          # Estilo "Cremita" (Amarillo #FFE953)
          # Usamos un tema oscuro de base y aplicamos tu color de acento
          config_colors_theme: dark
          palette: custom
          color_primary: "#FFE953"
          
          # ORDEN DE LOS PANELES (Igual que en tu imagen de referencia)
          config_order: followup, languages

          # PANEL 1: GitHub Statistics (Equivalente a Isocalendar/Followup)
          plugin_followup: yes
          plugin_followup_sections: repositories
          # plugin_isocalendar: yes # Si prefieres el calendario de commits

          # PANEL 2: Most Used Languages (Con diseño de tarjetas)
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          plugin_languages_limit: 6
          
          # Esto fuerza el diseño de tarjeta redondeada para lenguajes
          plugin_languages_indepth: yes

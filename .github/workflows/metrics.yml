name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN_STATS }}
          user: BR444N
          template: classic
          base: "" 
          config_timezone: America/Mexico_City
          
          # ORDEN DE LOS PANELES
          config_order: languages, followup

          # CONFIGURACIÓN DE COLORES Y ESTILO
          # Los metemos aquí para evitar el "Unexpected input"
          config_options: |
            {
              "colors": {
                "primary": "#FFE953"
              },
              "dark_mode": true
            }
          
          # PANEL 1: Most Used Languages (Diseño de tarjeta)
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          plugin_languages_limit: 6
          
          # PANEL 2: Activity Stats (Equivalente al panel izquierdo)
          plugin_followup: yes
          plugin_followup_sections: repositories

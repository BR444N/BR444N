name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Se actualiza cada medianoche
  workflow_dispatch: # Permite ejecutarlo manualmente
push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # Configuración visual
          user: BR444N
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Mexico_City
          
          # Estilo "Cremita" (Amarillo #FFE953)
          config_colors_theme: unicode
          palette: custom
          color_primary: "#FFE953"
          
          # Orden de las secciones
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex # Ignora lenguajes de marcado si prefieres
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          
          # Stats generales
          plugin_lines: yes
